name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: []
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build & push Docker image
        run: |
          echo "Add your container registry push here"
          echo "e.g. docker build -t registry/opensplit-backend ./backend"

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          echo "Add: npx vercel --prod --token \${{ secrets.VERCEL_TOKEN }}"
